  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <ellipse cx="300" cy="200" rx="400" ry="300" fill="url(#glow)" opacity="0.6"/>
  <ellipse cx="1000" cy="480" rx="350" ry="250" fill="url(#glow)" opacity="0.4"/>

  <rect x="80" y="200" width="4" height="230" rx="2" fill="url(#accent)" opacity="0.8"/>

  <text x="116" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="76" font-weight="800" letter-spacing="-3" fill="#ffffff">Allotly</text>

  <rect x="116" y="300" width="700" height="3" rx="1.5" fill="url(#accent)" opacity="0.4"/>

  <text x="116" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="400" fill="#a1a1aa" letter-spacing="0">One key. Every model. One budget.</text>

  <text x="116" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="#52525b">Real-time AI API budget enforcement for teams and vouchers.</text>

